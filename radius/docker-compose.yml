services:

  # ── Base de données PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hilton_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: radius_hotel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d radius_hotel"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FreeRADIUS (image custom avec SQL activé) ───────────────
  freeradius:
    build:
      context: ./freeradius
      dockerfile: Dockerfile
    image: hilton_freeradius:latest
    container_name: hilton_freeradius
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=radius_hotel
      - DB_USER=postgres
      - DB_PASS=postgres
    healthcheck:
      test: ["CMD", "pgrep", "-x", "freeradius"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Application Next.js (portail captif) ───────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hilton_captive_portal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      freeradius:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: radius_hotel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      RADIUS_HOST: freeradius
      RADIUS_PORT: 1812
      RADIUS_SECRET: testing123
    ports:
      - "3000:3000"

volumes:
  postgres_data:
