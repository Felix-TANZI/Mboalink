# ============================================================
#  FreeRADIUS — clients.conf
#  Déclare les NAS/clients autorisés à envoyer des requêtes
#  au serveur RADIUS.
#
#  Dans notre cas, le "client" RADIUS est le container Next.js
#  (portail captif), pas l'utilisateur final.
# ============================================================

# Client localhost (pour les tests internes et le healthcheck)
client localhost {
    ipaddr          = 127.0.0.1
    secret          = testing123
    shortname       = localhost
    nas_type        = other
}

# Réseau Docker interne — autorise tous les containers du réseau
# Docker Compose crée un réseau 172.16.0.0/12 par défaut
client docker_network {
    ipaddr          = 172.0.0.0/8
    secret          = testing123
    shortname       = docker_internal
    nas_type        = other
}
