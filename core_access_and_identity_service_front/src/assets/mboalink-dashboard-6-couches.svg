<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C1222"/>
      <stop offset="1" stop-color="#111933"/>
    </linearGradient>
    <linearGradient id="panel" x1="210" y1="170" x2="1390" y2="910" gradientUnits="userSpaceOnUse">
      <stop stop-color="#121B34"/>
      <stop offset="1" stop-color="#0E162C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 42px 'DejaVu Sans', Arial, sans-serif; fill: #F6F8FF; }
      .subtitle { font: 400 20px 'DejaVu Sans', Arial, sans-serif; fill: #A8B4D8; }
      .layer-label { font: 700 22px 'DejaVu Sans', Arial, sans-serif; fill: #F8FBFF; }
      .layer-text { font: 400 18px 'DejaVu Sans', Arial, sans-serif; fill: #E6ECFF; }
      .small { font: 400 16px 'DejaVu Sans', Arial, sans-serif; fill: #D7E1FF; }
      .chip { font: 700 16px 'DejaVu Sans', Arial, sans-serif; fill: #07111F; }
      .footer { font: 400 18px 'DejaVu Sans', Arial, sans-serif; fill: #B8C4E8; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1350" cy="120" r="220" fill="#1F7BFF" fill-opacity="0.08"/>
  <circle cx="260" cy="900" r="240" fill="#12C28A" fill-opacity="0.08"/>
  <circle cx="1460" cy="860" r="180" fill="#F3C623" fill-opacity="0.07"/>

  <text x="120" y="92" class="title">MboaLink Dashboard: les 6 couches de supervision</text>
  <text x="120" y="128" class="subtitle">Lecture inspiree du dashboard GuestTek, adaptee pour un centre de controle hotel + reseau + experience client</text>

  <rect x="120" y="160" width="1360" height="760" rx="28" fill="url(#panel)" stroke="#263556" stroke-width="2" filter="url(#shadow)"/>

  <rect x="190" y="210" width="1220" height="86" rx="18" fill="#22C55E"/>
  <rect x="210" y="228" width="160" height="50" rx="12" fill="#E8FFF0" fill-opacity="0.18"/>
  <text x="228" y="260" class="chip">Couche 1</text>
  <text x="390" y="248" class="layer-label">Sante des services critiques</text>
  <text x="390" y="276" class="small">OVI/Controller, DHCP, DNS, NTP, PMS, portail captif, internet uplink</text>

  <rect x="190" y="318" width="1220" height="86" rx="18" fill="#3B82F6"/>
  <rect x="210" y="336" width="160" height="50" rx="12" fill="#EAF3FF" fill-opacity="0.18"/>
  <text x="228" y="368" class="chip">Couche 2</text>
  <text x="390" y="356" class="layer-label">Inventaire et disponibilite de l'infrastructure</text>
  <text x="390" y="384" class="small">Switches, access points, gateways, controleurs, statut online/offline, heartbeat, firmware</text>

  <rect x="190" y="426" width="1220" height="86" rx="18" fill="#8B5CF6"/>
  <rect x="210" y="444" width="160" height="50" rx="12" fill="#F2EAFF" fill-opacity="0.18"/>
  <text x="228" y="476" class="chip">Couche 3</text>
  <text x="390" y="464" class="layer-label">Activite utilisateur et connexions</text>
  <text x="390" y="492" class="small">Guest logins, sessions actives, devices connectes, repartition OS, types d'appareils, zones</text>

  <rect x="190" y="534" width="1220" height="86" rx="18" fill="#F59E0B"/>
  <rect x="210" y="552" width="160" height="50" rx="12" fill="#FFF3DE" fill-opacity="0.18"/>
  <text x="228" y="584" class="chip">Couche 4</text>
  <text x="390" y="572" class="layer-label">Performance et usage reseau</text>
  <text x="390" y="600" class="small">Download, upload, utilisation bande passante, liens WAN, interfaces, historique temporel, saturation</text>

  <rect x="190" y="642" width="1220" height="86" rx="18" fill="#EC4899"/>
  <rect x="210" y="660" width="160" height="50" rx="12" fill="#FFE8F5" fill-opacity="0.18"/>
  <text x="228" y="692" class="chip">Couche 5</text>
  <text x="390" y="680" class="layer-label">Contexte metier hotelier</text>
  <text x="390" y="708" class="small">Hotels, chambres, taux de check-in, occupation, fuseau horaire, periode d'analyse, statut PMS</text>

  <rect x="190" y="750" width="1220" height="86" rx="18" fill="#14B8A6"/>
  <rect x="210" y="768" width="160" height="50" rx="12" fill="#E5FFFC" fill-opacity="0.18"/>
  <text x="228" y="800" class="chip">Couche 6</text>
  <text x="390" y="788" class="layer-label">Drill-down et investigation operationnelle</text>
  <text x="390" y="816" class="small">Boutons cliquables: switches, access points, services critiques, alertes, changements, details equipements</text>

  <path d="M1480 253C1522 280 1522 334 1480 361" stroke="#22C55E" stroke-width="6" stroke-linecap="round"/>
  <path d="M1480 361C1522 388 1522 442 1480 469" stroke="#3B82F6" stroke-width="6" stroke-linecap="round"/>
  <path d="M1480 469C1522 496 1522 550 1480 577" stroke="#8B5CF6" stroke-width="6" stroke-linecap="round"/>
  <path d="M1480 577C1522 604 1522 658 1480 685" stroke="#F59E0B" stroke-width="6" stroke-linecap="round"/>
  <path d="M1480 685C1522 712 1522 766 1480 793" stroke="#EC4899" stroke-width="6" stroke-linecap="round"/>

  <rect x="120" y="940" width="1360" height="1" fill="#2B385B"/>
  <text x="120" y="972" class="footer">Vision: unifier supervision technique, sante des services, experience client et contexte hotelier dans un seul dashboard MboaLink.</text>
</svg>
