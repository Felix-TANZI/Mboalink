services:
  mboalink-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:3000/api/v1
    volumes:
      - .:/app
      - /app/node_modules
    command: ["/bin/sh", "-lc", "npm install && find node_modules/.bin -type f -exec dos2unix {} \\; && npm run dev -- --host 0.0.0.0 --port 5173"]