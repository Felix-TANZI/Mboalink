image: node:18

stages:
  - build
  - test
  - quality
  - package

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

variables:
  NODE_ENV: production
  DOCKER_IMAGE: $DOCKERHUB_USERNAME/react-app

# ------------------
# BUILD
# ------------------
build:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - build/
    expire_in: 1 hour

# ------------------
# TEST
# ------------------
test:
  stage: test
  script:
    - npm ci
    - npm test -- --watch=false
  allow_failure: false

# ------------------
# QUALITY (SonarCloud)
# ------------------
sonarqube:
  stage: quality
  image: sonarsource/sonar-scanner-cli:latest
  script:
    - sonar-scanner
      -Dsonar.projectKey=$SONAR_PROJECT_KEY
      -Dsonar.organization=$SONAR_ORG
      -Dsonar.sources=src
      -Dsonar.host.url=https://sonarcloud.io
      -Dsonar.login=$SONAR_TOKEN
  allow_failure: true
  only:
    - main
    - develop

# ------------------
# PACKAGE (DockerHub)
# ------------------
docker-build-push:
  stage: package
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
  script:
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker tag $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA $DOCKER_IMAGE:latest
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKER_IMAGE:latest
  only:
    - main
