client localhost {
    ipaddr          = 127.0.0.1
    secret          = $ENV{RADIUS_SECRET}
    shortname       = localhost
    nas_type        = other
}

client docker_network {
    ipaddr          = 172.0.0.0/8
    secret          = $ENV{RADIUS_SECRET}
    shortname       = docker_internal
    nas_type        = other
}

# Railway/private container networks can differ from Docker Compose ranges.
# Keep this broad only with a strong RADIUS_SECRET.
client private_ipv4 {
    ipaddr          = 0.0.0.0/0
    secret          = $ENV{RADIUS_SECRET}
    shortname       = private_ipv4
    nas_type        = other
}

client private_ipv6 {
    ipv6addr        = ::/0
    secret          = $ENV{RADIUS_SECRET}
    shortname       = private_ipv6
    nas_type        = other
}
